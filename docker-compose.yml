services:
  postgres:
    image: postgres:16
    container_name: refugeeflow-postgres
    environment:
      POSTGRES_USER: rfuser
      POSTGRES_PASSWORD: rfpassword
      POSTGRES_DB: refugeeflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rfuser -d refugeeflow"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
